  /orcabase/api/sql:
    post:
      summary: Execute Custom SQL Query
      description: 'Run custom SQL queries for structured data retrieval. The response returns the query results in a JSON
        format.

        '
      operationId: data-out-execute-custom-sql-query
      tags:
      - Data Out
      security:
      - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - query
              - period
              - shopId
              properties:
                shopId:
                  type: string
                  description: 'The shop domain for which you are requesting data  (e.g., `example.myshopify.com`).

                    '
                  example: example.myshopify.com
                query:
                  type: string
                  description: 'The SQL query string to execute. Include dynamic `@startDate` AND `@endDate` parameters in
                    your query string, and provide specific start and end values in the request body via `period.startDate`
                    and `period.endDate`.

                    '
                  example: SELECT SUM(spend) AS spend, channel FROM ads_table a WHERE event_date BETWEEN @startDate AND @endDate
                    GROUP BY channel
                currency:
                  type: string
                  description: The currency for data aggregation (e.g., USD, EUR). Defaults to the currency provided during
                    user account registration.
                  example: USD
                period:
                  type: object
                  description: The date range for the query period.
                  required:
                  - startDate
                  - endDate
                  properties:
                    startDate:
                      type: string
                      format: date
                      description: The start date for the query period (ISO 8601 format).
                      example: '2025-07-01'
                    endDate:
                      type: string
                      format: date
                      description: The end date for the query period (ISO 8601 format).
                      example: '2025-07-31'
      responses:
        '200':
          description: 'The SQL query was executed successfully, and the response contains the query results in a JSON format
            grouped by `channel` and `event_date`.

            '
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Indicates whether the request was successful.
                    example: true
                  message:
                    type: string
                    description: A success message indicating the query was executed.
                    example: The query was executed successfully.
                  data:
                    type: array
                    description: 'The query results as an array of objects, with dynamically generated properties that can
                      include strings, numbers, dates, or other types.

                      '
                    items:
                      type: object
                      additionalProperties:
                        oneOf:
                        - type: string
                        - type: number
                        - type: boolean
                        - type: object
                        - type: array
                        - type: string
                          format: date
                    example:
                    - channel: facebook-ads
                      event_date: '2024-12-01'
                      spend: 345.0
                      clicks: 1250
                    - channel: google-ads
                      event_date: '2024-12-02'
                      spend: 412.75
                      clicks: 900
                    - channel: twitter-ads
                      event_date: '2024-12-03'
                      spend: 210.25
                      clicks: 640
        '400':
          description: Invalid request due to missing or malformed parameters.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Indicates whether the request was successful.
                    example: false
                  message:
                    type: string
                    description: 'An error message describing why the request failed, including the names of missing or malformed
                      parameters.

                      '
                    example: 'Missing fields: query, startDate, endDate'
        '403':
          description: Access forbidden due to missing or invalid access token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Indicates whether the request was successful.
                    example: false
                  message:
                    type: string
                    description: An error message indicating missing or invalid credentials.
                    example: Access token is required
        '429':
          description: Rate limit exceeded. Too many requests were sent in a short period.
          headers:
            Retry-After:
              description: 'The number of seconds until you can make another request.

                '
              schema:
                type: integer
                example: 10
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Indicates whether the request was successful.
                    example: false
                  message:
                    type: string
                    description: 'An error message describing the rate limit issue and suggesting when to retry.

                      '
                    example: Rate limit exceeded. Please wait 10 seconds before retrying.
        '500':
          description: Internal server error. An unexpected issue occurred on the server.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Indicates whether the request was successful.
                    example: false
                  message:
                    type: string
                    description: An error message describing the internal server error.
                    example: An unexpected error occurred. Please try again later.
  /attribution/get-orders-with-journeys-v2:
    post:
      summary: Get Customer Journey Attribution Data
      description: 'Export full customer journey data, with Triple Pixel attribution, for all customers who placed an order
        in the specified period.

        '
      operationId: get-customer-journey-attribution-data
      tags:
      - Data Out
      security:
      - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - shop
              - startDate
              - endDate
              properties:
                shop:
                  type: string
                  description: 'The exact Shop URL (e.g., ''example.myshopify.com''). Must match the Shop URL value shown
                    in  [Settings → Store](https://app.triplewhale.com/store-settings/general). The API key owner must  also
                    have access to the shop, otherwise the request will return 403.

                    '
                  example: madisonbraids.myshopify.com
                startDate:
                  type: string
                  description: 'The start date or timestamp for the requested data period.  Must be in ISO 8601 format.

                    '
                  example: 2021-01-01T00:00:00.000-0400
                endDate:
                  type: string
                  description: 'The end date or timestamp for the requested data period.  Must be in ISO 8601 format.

                    '
                  example: 2021-01-01T23:59:59.999-0400
                page:
                  type: number
                  description: 'The page number of results to return, starting from 1.  Use this to paginate through the data.

                    '
                  minimum: 1
                  maximum: 10000
                  example: 2
                  default: 1
                pageSize:
                  type: number
                  description: 'The number of results per page. Must be between 1 and 100.

                    '
                  minimum: 1
                  maximum: 100
                  example: 25
                  default: 50
                excludeJourneyData:
                  type: boolean
                  description: 'Set this to `true` to exclude journey data from the response.

                    '
                  default: false
                  example: false
            examples:
              ExampleRequest:
                value:
                  shop: madisonbraids.myshopify.com
                  startDate: 2021-01-01T00:00:00.000-0400
                  endDate: 2021-01-01T23:59:59.999-0400
                  page: 2
                  pageSize: 25
                  excludeJourneyData: false
      responses:
        '200':
          description: 'A successful response containing orders, attribution data,  and (optionally) journey events for the
            requested period.

            '
          headers:
            RateLimit-Policy:
              description: 'The rate limit policy for this endpoint, given as {quota};w={window} where  window is in seconds
                and quota is the allowed number of calls a user can make  per window.

                '
              schema:
                type: string
              example: 100;w=60
            RateLimit:
              description: 'Information about the user''s rate limit usage for this endpoint.

                '
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                required:
                - totalForRange
                - count
                - startDate
                - endDate
                - ordersWithJourneys
                - earliestDate
                properties:
                  totalForRange:
                    type: number
                    description: 'The total number of orders within the requested date range.

                      '
                  count:
                    type: number
                    description: 'The number of orders returned in the current page of results.

                      '
                  startDate:
                    type: string
                    description: 'The start date or timestamp of the requested period in ISO 8601 format.

                      '
                    example: 2021-01-01T00:00:00.000-0400
                  endDate:
                    type: string
                    description: 'The end date or timestamp of the requested period in ISO 8601 format.

                      '
                    example: 2021-01-01T23:59:59.999-0400
                  page:
                    type: number
                    description: 'The page number of the current response. Starts at 1.

                      '
                  ordersWithJourneys:
                    type: array
                    description: 'A list of orders along with their attribution and journey details.

                      '
                    items:
                      type: object
                      required:
                      - order_id
                      - created_at
                      - order_name
                      - attribution
                      - customer_id
                      - total_price
                      - currency
                      - journey
                      properties:
                        order_id:
                          type: number
                          description: 'The unique identifier for the order.

                            '
                        created_at:
                          type: string
                          description: 'The timestamp when the order was created, in ISO 8601 format.

                            '
                        order_name:
                          type: string
                          description: 'The name of the order as defined in the e-commerce platform.

                            '
                        attribution:
                          type: object
                          description: 'Attribution details for the order.

                            '
                          properties:
                            firstClick:
                              type: array
                              description: 'A list of First Click attribution records, representing  the initial interaction
                                leading to the order.

                                '
                              items:
                                type: object
                                required:
                                - source
                                - campaignId
                                - adsetId
                                - adId
                                - clickDate
                                properties:
                                  source:
                                    type: string
                                    description: The source of the attribution (e.g., Facebook, Google).
                                  campaignId:
                                    type: string
                                    description: The unique identifier of the campaign.
                                  adsetId:
                                    type: string
                                    description: The unique identifier of the adset.
                                  adId:
                                    type: string
                                    description: The unique identifier of the ad.
                                  clickDate:
                                    type: string
                                    description: The timestamp of the click event.
                        customer_id:
                          type: number
                          description: 'The unique identifier for the customer associated with the order.

                            '
                        total_price:
                          type: string
                          description: 'The total price of the order.

                            '
                        currency:
                          type: string
                          description: 'The currency code for the order (e.g., USD, EUR).

                            '
                          example: USD
                        journey:
                          type: array
                          description: 'A list of events in the customer journey, such as page views  or add-to-cart events,
                            leading to the order.

                            '
                          items:
                            type: object
                            required:
                            - time
                            - event
                            - path
                            - productId
                            properties:
                              time:
                                type: string
                                description: The timestamp of the journey event, in ISO 8601 format.
                              event:
                                type: string
                                description: 'The name of the journey event (e.g., `page loaded` for page views,  `add2c`
                                  for add-to-cart actions).

                                  '
                                enum:
                                - page loaded
                                - add2c
                              path:
                                type: string
                                description: 'The URL path of the event (e.g., `/products/product-name`).

                                  '
                              productId:
                                type: string
                                description: 'The unique identifier of the product associated with the event.

                                  '
                  earliestDate:
                    type: string
                    description: 'The earliest date among the orders returned in this response.  Returns `null` if there are
                      no earlier orders.

                      '
                  error:
                    type: string
                    description: 'An error message if the request failed or encountered an issue.

                      '
        '429':
          description: Too Many Requests
          headers:
            Retry-After:
              description: 'The number of seconds until the user can make another request.

                '
              schema:
                type: string
              example: '60'
