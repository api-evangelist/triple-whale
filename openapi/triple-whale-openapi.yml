openapi: 3.0.3
info:
  title: Triple Whale API
  version: '1.0'
  description: 'Triple Whale API documentation, providing endpoints for managing user authentication, API key validation,
    and uploading data such as ads and metrics.

    '
servers:
- url: https://api.triplewhale.com/api/v2/
components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
security:
- apiKeyAuth: []
paths:
  /users/api-keys/me:
    get:
      summary: Validate Your Triple Whale API Key
      description: 'Enter your API key in Credentials > Header to the right and click "Try it!" to test its validity.

        '
      operationId: validate-your-triple-whale-api-key
      tags:
      - API Keys
      security:
      - apiKeyAuth: []
      parameters: []
      responses:
        '200':
          description: A successful response
          headers:
            RateLimit-Policy:
              description: 'The rate limit policy for this endpoint, given as `{quota};w={window}` where `window` is in seconds
                and `quota` is the allowed number of calls a user can make per window.

                '
              schema:
                type: string
              example: 100;w=60
            RateLimit:
              description: 'Information about the user''s rate limit usage for this endpoint.

                '
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
              examples:
                Result:
                  value: '{}'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
              examples:
                Result:
                  value: '{}'
        '429':
          description: Too Many Requests
          headers:
            Retry-After:
              description: 'The number of seconds until the user can make another request.

                '
              schema:
                type: string
              example: '60'
  /data-in/ads:
    post:
      summary: Create Ad Record
      description: 'Ingest ad data into Triple Whale. This endpoint allows users to upload  detailed ad information, including
        campaign, adset, ad details, and  performance metrics.

        '
      operationId: create-ad-record
      tags:
      - Data In
      security:
      - apiKeyAuth: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - shop
              - channel
              - event_date
              - currency
              properties:
                shop:
                  type: string
                  description: 'The exact Shop URL (e.g., ''example.myshopify.com''). Must match the Shop URL value shown
                    in  [Settings → Store](https://app.triplewhale.com/store-settings/general). The API key owner must  also
                    have access to the shop, otherwise the request will return 403.

                    '
                  example: madisonbraids.myshopify.com
                channel:
                  type: string
                  description: 'The advertising platform associated with the ad data. Use a [Standardized Ad Channel ID](https://triplewhale.readme.io/docs/ads-standardized-channel-ids#/)
                    or enter a custom value.

                    '
                  example: facebook-ads
                channel_account_id:
                  type: string
                  description: 'The platform-specific account ID. Maps to `account_id` in the Ads table.

                    '
                  default: CUSTOM_CHANNEL
                  example: example_fb_account
                event_date:
                  type: string
                  format: date
                  description: 'The date of the event in local timezone. Must be a valid date string (e.g., YYYY-MM-DD).

                    '
                  example: '2024-11-28'
                currency:
                  type: string
                  description: The currency used for reporting (e.g., 'USD').
                  example: USD
                campaign:
                  type: object
                  description: Details of the advertising campaign. At least one of `campaign`, `adset`, or `ad` is required.
                  required:
                  - id
                  - name
                  - status
                  properties:
                    id:
                      type: string
                      description: The unique ID of the campaign. Maps to `campaign_id` in the Ads table.
                      example: campaign_example_id
                    name:
                      type: string
                      description: The name of the campaign. Maps to `campaign_name` in the Ads table.
                      example: Example Campaign
                    status:
                      type: string
                      enum:
                      - PAUSED
                      - ACTIVE
                      description: The status of the campaign (e.g., 'PAUSED' or 'ACTIVE'). Maps to `campaign_status` in the
                        Ads table.
                      example: ACTIVE
                adset:
                  type: object
                  description: Details of the adset. At least one of `campaign`, `adset`, or `ad` is required.
                  required:
                  - id
                  - name
                  - status
                  properties:
                    id:
                      type: string
                      description: The unique ID of the adset. Maps to `adset_id` in the Ads table.
                      example: adset_example_id
                    name:
                      type: string
                      description: The name of the adset. Maps to `adset_name` in the Ads table.
                      example: Example Adset
                    status:
                      type: string
                      enum:
                      - PAUSED
                      - ACTIVE
                      description: The status of the adset (e.g., 'PAUSED' or 'ACTIVE'). Maps to `adset_status` in the Ads
                        table.
                      example: ACTIVE
                ad:
                  type: object
                  description: Details of the individual ad. At least one of `campaign`, `adset`, or `ad` is required.
                  required:
                  - id
                  - name
                  - status
                  properties:
                    id:
                      type: string
                      description: The unique ID of the ad. Maps to `ad_id` in the Ads table.
                      example: ad_example_id
                    name:
                      type: string
                      description: The name of the ad. Maps to `ad_name` in the Ads table.
                      example: Example Ad
                    status:
                      type: string
                      enum:
                      - PAUSED
                      - ACTIVE
                      description: The status of the ad (e.g., 'PAUSED' or 'ACTIVE'). Maps to `ad_status` in the Ads table.
                      example: ACTIVE
                    thumbnail:
                      type: string
                      description: The URL of the ad's thumbnail image. Maps to `ad_image_url` in the Ads table.
                      example: https://example.com/placeholder.jpg
                metrics:
                  type: object
                  description: Performance metrics for the ad.
                  properties:
                    clicks:
                      type: number
                      description: Total number of clicks.
                      default: 0
                      example: 1500
                    conversions:
                      type: number
                      description: Total number of conversions (purchases).
                      default: 0
                      example: 75
                    conversion_value:
                      type: number
                      description: Total conversion value (order revenue).
                      default: 0
                      example: 3750.5
                    impressions:
                      type: number
                      description: Total number of impressions.
                      default: 0
                      example: 25000
                    spend:
                      type: number
                      description: Total ad spend.
                      default: 0
                      example: 500
                    visits:
                      type: number
                      description: Total number of visits.
                      default: 0
                      example: 2000
                updated_at:
                  type: string
                  format: date-time
                  description: 'The time at which the ad record was last updated. Must be provided in ISO 8601 format, with
                    explicit timezone information (`Z` or `+/-HH:mm` offset). Offsets are supported (e.g., `2024-11-29T12:00:00+02:00`).
                    Defaults to the current time.

                    '
                  example: '2024-11-28T15:30:00Z'
      responses:
        '200':
          description: Ad record successfully received.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Ad received
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Invalid ad data.
        '429':
          description: Too Many Requests
          headers:
            Retry-After:
              description: The number of seconds until the user can make another request.
              schema:
                type: string
              example: '60'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Rate limit exceeded. Try again later.
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Error processing ad
  /data-in/orders:
    post:
      summary: Create Order Record
      description: 'Ingest order data into Triple Whale for Custom Sales Platforms.   This endpoint allows users to upload  detailed
        order information,  including customer details, product information, transaction totals,  discounts, refunds, and
        shipping details.

        '
      operationId: create-order-record
      tags:
      - Data In
      security:
      - apiKeyAuth: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - shop
              - order_id
              - created_at
              - currency
              - customer
              - order_revenue
              properties:
                shop:
                  type: string
                  description: 'The exact Shop URL (e.g., ''example.myshopify.com''). Must match the Shop URL value shown
                    in  [Settings → Store](https://app.triplewhale.com/store-settings/general). The API key owner must  also
                    have access to the shop, otherwise the request will return 403. Maps to `shop_id` in the Orders table.

                    '
                  example: madisonbraids.myshopify.com
                order_id:
                  type: string
                  description: The unique identifier for the order.
                  example: order_12345
                platform:
                  type: string
                  description: 'The sales platform where the order originated. Note that for custom sales platforms, the platform
                    will appear as `custom-msp` in SQL queries the Triple Whale app, regardless of the value sent.

                    '
                  default: custom-msp
                  example: magento
                platform_account_id:
                  type: string
                  description: 'The account ID associated with the platform.

                    '
                  default: custom-msp
                  example: shop_account_123
                created_at:
                  type: string
                  format: date-time
                  description: 'The time at which the order record was created. Must be provided in ISO 8601 format, with
                    explicit timezone information (`Z` or `+/-HH:mm` offset). Offsets are supported (e.g., `2022-06-15T21:26:30+02:00`).
                    Maps to `created_at` in the Orders table and is  used to derive `event_date`, which reflects the shop
                    time zone.

                    '
                  example: '2022-06-15T19:26:30.000Z'
                currency:
                  type: string
                  description: The currency in which the transaction was processed (e.g. `USD`, `EUR`).
                  example: USD
                customer:
                  type: object
                  description: 'Details of the customer who placed the order. The `id` field is required.  Additionally, at
                    least one of `email` or `phone` must be provided.

                    '
                  required:
                  - id
                  properties:
                    id:
                      type: string
                      description: The unique identifier for the customer. Maps to `customer_id` in the Orders table.
                      example: customer_123
                    email:
                      type: string
                      description: The customer’s email address. Maps to `customer_email` in the Orders table.
                      example: customer@example.com
                    phone:
                      type: string
                      description: The customer’s phone number.
                      example: '+1234567890'
                    first_name:
                      type: string
                      description: The customer’s first name. Maps to `customer_first_name` in the Orders table.
                      example: John
                    last_name:
                      type: string
                      description: The customer’s last name. Maps to `customer_last_name` in the Orders table.
                      example: Doe
                custom_expenses:
                  type: number
                  description: Custom expenses associated with the order, must be non-negative.
                  example: 25.0
                discount_codes:
                  type: array
                  description: Discount codes applied to the order.
                  items:
                    type: object
                    properties:
                      code:
                        type: string
                        description: The discount code used in the order. Maps to `discount_code` in the Orders table.
                        example: BLACKFRIDAY
                      amount:
                        type: number
                        description: The discount amount applied for the discount code. Must be non-negative. Note that this
                          field does not map to `discount_amount` in the Orders table; to send total discount amount for the
                          order, use `total_discounts`.
                        example: 15.5
                      type:
                        type: string
                        description: 'The type of discount applied. Use `percentage` when the discount amount represents a
                          percentage of the order total, and `fixed_amount` when it represents a fixed monetary value in the
                          order’s currency. Maps to `discount_type` in the Orders table.

                          '
                        enum:
                        - percentage
                        - fixed_amount
                        example: percentage
                line_items:
                  type: array
                  description: Details of the products in the order.
                  items:
                    type: object
                    required:
                    - id
                    - quantity
                    - price
                    - variant_id
                    - product_id
                    properties:
                      id:
                        type: string
                        description: The unique identifier for the line item.
                        example: line_item_1
                      name:
                        type: string
                        description: The name for the line item.
                        example: Line Item 1
                      price:
                        type: number
                        description: The price of the product. Maps to `products_info.product_name_price` in the Orders table.
                        example: 20.0
                      quantity:
                        type: integer
                        description: The quantity of the product in the order. Maps to `products_info.product_name_quantity_sold`
                          in the Orders table.
                        example: 2
                      product_id:
                        type: string
                        description: The unique identifier for the product. Maps to `products_info.product_id` in the Orders
                          table. Required for [Product Analytics](https://app.triplewhale.com/dashboards/product-analytics);
                          must match a `product_id` sent via the `/products` endpoint.
                        example: product_123
                      product_name:
                        type: string
                        description: The name of the product associated with this line item. Maps to `products_info.product_name`
                          in the Orders table.
                        example: T-shirt
                      variant_id:
                        type: string
                        description: The unique identifier for the product variant. Maps to `products_info.variant_id` in
                          the Orders table.
                        example: variant_456
                      variant_name:
                        type: string
                        description: The name of the product variant. Maps to `products_info.variant_name` in the Orders table.
                        example: Red T-shirt (Large)
                      sku:
                        type: string
                        description: The stock keeping unit of the product. Maps to `products_info.product_sku` in the Orders
                          table.
                        example: sku_123
                name:
                  type: string
                  description: 'The name of the order, as assigned by the seller on the main sales platform. Maps to `order_name`
                    in the Orders table. Defaults to `order_id` if not provided.

                    '
                  example: 'Order #12345'
                payment_gateway_names:
                  type: array
                  description: 'The payment gateway used for the transaction (e.g., `shopify_payments`, `paypal`, `gift_card`).
                    Required in order to update payment gateway settings, and to calculate `payment_gateway_costs` in the
                    Orders table. Edit Payment Gateway Costs in [Cost Settings](https://app.triplewhale.com/cost-settings)
                    > Gateway Costs.

                    '
                  items:
                    type: string
                  example:
                  - paypal
                refunds:
                  type: array
                  description: Details of refunds applied to the order.
                  items:
                    type: object
                    required:
                    - refund_id
                    - refunded_at
                    - total_refund
                    properties:
                      refund_id:
                        type: string
                        description: The unique identifier for the refund.
                        example: refund_1
                      refunded_at:
                        type: string
                        format: date-time
                        description: 'The time at which the refund was processed. Must be provided in ISO 8601 format, with
                          explicit timezone information (`Z` or `+/-HH:mm` offset). Offsets are supported (e.g., `2024-11-29T12:00:00+02:00`).

                          '
                        example: '2024-11-29T11:00:00Z'
                      line_items:
                        type: array
                        description: Details of refunded line items.
                        items:
                          type: object
                          required:
                          - id
                          - quantity
                          - price
                          - variant_id
                          properties:
                            id:
                              type: string
                              description: The unique identifier for the refunded line item.
                              example: line_item_1
                            line_item_id:
                              type: string
                              description: The unique identifier of the line item associated with this refund line item.
                              example: line_item_1
                            quantity:
                              type: integer
                              description: The quantity of the refunded line item.
                              example: 1
                            product_id:
                              type: string
                              description: The unique identifier for the refunded product.
                              example: product_123
                            variant_id:
                              type: string
                              description: The unique identifier for the refunded variant.
                              example: variant_456
                            price:
                              type: number
                              description: The price of the refunded line item.
                              example: 20.0
                            currency:
                              type: string
                              description: The currency of the refunded line item.
                              example: USD
                            total_discount:
                              type: number
                              description: The total discount applied to the refunded line item.
                              example: 0.0
                      total_refund:
                        type: number
                        description: The total amount refunded.
                        example: 40.0
                      total_tax_refund:
                        type: number
                        description: The total tax refunded.
                        example: 3.0
                      total_shipping_refund:
                        type: number
                        description: The total shipping refunded.
                        example: 5.0
                      tags:
                        type: array
                        description: Tags associated with the refund.
                        items:
                          type: string
                          example: damaged_item
                      void:
                        type: boolean
                        description: 'Set to `true` to void (soft delete) this refund.  Voided refund records are excluded
                          from all queries.   To void a refund, resend the entire Order record with all fields identical except
                          for `"void": true` for this refund.   [Learn more](https://triplewhale.readme.io/reference/managing-data-in-connections#voiding-records-soft-delete)

                          '
                        default: false
                        example: false
                shipping_address:
                  type: object
                  description: Shipping address details.
                  properties:
                    address_1:
                      type: string
                      description: The first line of the address.
                      example: 123 Main Street
                    address_2:
                      type: string
                      description: The second line of the address.
                      example: Apt 4B
                    zip:
                      type: string
                      description: The ZIP or postal code of the address.
                      example: '10001'
                    city:
                      type: string
                      description: The city of the address. Maps to `customer_from_city` in the Orders table.
                      example: New York
                    country:
                      type: string
                      description: The country of the address.
                      example: USA
                    country_code:
                      type: string
                      description: The country code of the address. Maps to `customer_from_country_code` in the Orders table.
                      example: US
                    province_code:
                      type: string
                      description: The province or state code of the address. Maps to `customer_from_state_code` in the Orders
                        table.
                      example: NY
                shipping_lines:
                  type: array
                  description: Details of the shipping lines for the order.
                  items:
                    type: object
                    properties:
                      shipping_discounted_price:
                        type: number
                        description: The discounted price for shipping.
                        example: 5.0
                      shipping_price:
                        type: number
                        description: The original price for shipping.
                        example: 10.0
                      source:
                        type: string
                        description: The source or method of shipping.
                        example: standard_shipping
                      title:
                        type: string
                        description: The title or description of the shipping method.
                        example: Standard Shipping
                shipping_price:
                  type: number
                  description: The total shipping price of the order (paid by the buyer), including shipping taxes and shipping
                    discounts.
                  example: 15.0
                shipping_costs:
                  type: number
                  description: 'Shipping costs paid by the seller. Must be non-negative. To apply this value to your data,
                    ensure **Default Shipping Costs** is selected in [Cost Settings](https://app.triplewhale.com/cost-settings)
                    > Shipping.

                    '
                  example: 15.0
                source_name:
                  type: string
                  description: The origin of the order as designated by the seller on the main sales platform (e.g. `web`,
                    `pos`, `tiktok`).
                  example: web
                subscription_id:
                  type: string
                  description: The unique identifier for the subscription associated with the order.
                  example: sub_12345
                tags:
                  type: array
                  description: 'Tags associated with the order. Include a distinct tag to classify or identify specific order
                    types or processing rules. For example, use `holiday_sale` to mark seasonal campaign purchases, or `staff_order`
                    for internal orders.

                    '
                  items:
                    type: string
                  example:
                  - holiday_sale
                  - staff_order
                taxes_included:
                  type: boolean
                  description: Indicates if taxes are included in the total price of the order.
                  default: false
                  example: false
                order_revenue:
                  type: number
                  description: The total revenue after adjustments such as discounts, shipping, fees, and taxes. Must be non-negative.
                  example: 150.75
                total_discounts:
                  type: number
                  description: The total discount amount applied to the order, including shipping discounts. Must be non-negative.
                    Maps to `discount_amount` in the Orders table.
                  example: 15.5
                taxes:
                  type: number
                  description: The total tax applied to the order. Must be non-negative.
                  example: 8.25
                status:
                  type: string
                  description: The current status of the order (e.g., "completed", "pending"). Maps to `fulfillment_status`
                    in the Orders table.
                  example: completed
                updated_at:
                  type: string
                  format: date-time
                  description: 'The time at which the order record was last updated. Must be provided in ISO 8601 format,
                    with explicit timezone information (`Z` or `+/-HH:mm` offset). Offsets are supported (e.g., `2024-11-29T12:00:00+02:00`).
                    Defaults to the current time.

                    '
                  example: '2024-11-29T10:00:00Z'
                void:
                  type: boolean
                  description: 'Set to `true` to void (soft delete) this order record, as well as all associated refund records  (even
                    if the refunds are not individually voided).  Voided orders (and associated refunds) are excluded from
                    all queries.   To void an order record, resend it with all fields identical except for `"void": true`.   [Learn
                    more](https://triplewhale.readme.io/reference/managing-data-in-connections#voiding-records-soft-delete)

                    '
                  default: false
                  example: false
      responses:
        '200':
          description: Order record successfully received.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Order received
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Invalid order data.
        '429':
          description: Too Many Requests
          headers:
            Retry-After:
              description: The number of seconds until the user can make another request.
              schema:
                type: string
              example: '60'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Rate limit exceeded. Try again later.
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Error processing order
  /data-in/bulk-orders:
    post:
      summary: Bulk Create Order Records
      description: 'Ingest multiple order records into Triple Whale for Custom Sales Platforms.   This endpoint allows users
        to upload batches of order information, including customer details, product information, transaction totals, discounts,
        refunds, and shipping details.

        '
      operationId: bulk-create-order-records
      tags:
      - Data In
      security:
      - apiKeyAuth: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - shop
              - orders
              properties:
                shop:
                  type: string
                  description: 'The exact Shop URL (e.g., ''example.myshopify.com''). Must match the Shop URL value shown
                    in [Settings → Store](https://app.triplewhale.com/store-settings/general). The API key owner must also
                    have access to the shop, otherwise the request will return 403. Maps to `shop_id` in the Orders table.

                    This value is applied to every order in the `orders` array and overwrites any per-order `shop` value.

                    '
                  example: madisonbraids.myshopify.com
                orders:
                  type: array
                  description: 'An array of Order objects to ingest. Must contain between 1 and 1000 orders. Each order object
                    uses the same schema as the `/data-in/orders` endpoint, except `shop` is not required (and is ignored/overwritten
                    if provided).

                    '
                  minItems: 1
                  maxItems: 1000
                  items:
                    type: object
                    required:
                    - order_id
                    - created_at
                    - currency
                    - customer
                    - order_revenue
                    properties:
                      shop:
                        type: string
                        description: 'Optional. If provided, it will be overwritten by the top-level `shop` value in this
                          request.

                          '
                        example: madisonbraids.myshopify.com
                      order_id:
                        type: string
                        description: The unique identifier for the order.
                        example: order_12345
                      platform:
                        type: string
                        description: 'The sales platform where the order originated. Note that for custom sales platforms,
                          the platform will appear as `custom-msp` in SQL queries the Triple Whale app, regardless of the
                          value sent.

                          '
                        default: custom-msp
                        example: magento
                      platform_account_id:
                        type: string
                        description: 'The account ID associated with the platform.

                          '
                        default: custom-msp
                        example: shop_account_123
                      created_at:
                        type: string
                        format: date-time
                        description: 'The time at which the order record was created. Must be provided in ISO 8601 format,
                          with explicit timezone information (`Z` or `+/-HH:mm` offset). Offsets are supported (e.g., `2022-06-15T21:26:30+02:00`).
                          Maps to `created_at` in the Orders table and is  used to derive `event_date`, which reflects the
                          shop time zone.

                          '
                        example: '2022-06-15T19:26:30.000Z'
                      currency:
                        type: string
                        description: The currency in which the transaction was processed (e.g. `USD`, `EUR`).
                        example: USD
                      customer:
                        type: object
                        description: 'Details of the customer who placed the order. The `id` field is required.  Additionally,
                          at least one of `email` or `phone` must be provided.

                          '
                        required:
                        - id
                        properties:
                          id:
                            type: string
                            description: The unique identifier for the customer. Maps to `customer_id` in the Orders table.
                            example: customer_123
                          email:
                            type: string
                            description: The customer’s email address. Maps to `customer_email` in the Orders table.
                            example: customer@example.com
                          phone:
                            type: string
                            description: The customer’s phone number.
                            example: '+1234567890'
                          first_name:
                            type: string
                            description: The customer’s first name. Maps to `customer_first_name` in the Orders table.
                            example: John
                          last_name:
                            type: string
                            description: The customer’s last name. Maps to `customer_last_name` in the Orders table.
                            example: Doe
                      custom_expenses:
                        type: number
                        description: Custom expenses associated with the order, must be non-negative.
                        example: 25.0
                      discount_codes:
                        type: array
                        description: Discount codes applied to the order.
                        items:
                          type: object
                          properties:
                            code:
                              type: string
                              description: The discount code used in the order. Maps to `discount_code` in the Orders table.
                              example: BLACKFRIDAY
                            amount:
                              type: number
                              description: The discount amount applied for the discount code. Must be non-negative. Note that
                                this field does not map to `discount_amount` in the Orders table; to send total discount amount
                                for the order, use `total_discounts`.
                              example: 15.5
                            type:
                              type: string
                              description: 'The type of discount applied. Use `percentage` when the discount amount represents
                                a percentage of the order total, and `fixed_amount` when it represents a fixed monetary value
                                in the order’s currency. Maps to `discount_type` in the Orders table.

                                '
                              enum:
                              - percentage
                              - fixed_amount
                              example: percentage
                      line_items:
                        type: array
                        description: Details of the products in the order.
                        items:
                          type: object
                          required:
                          - id
                          - quantity
                          - price
                          - variant_id
                          - product_id
                          properties:
                            id:
                              type: string
                              description: The unique identifier for the line item.
                              example: line_item_1
                            name:
                              type: string
                              description: The name for the line item.
                              example: Line Item 1
                            price:
                              type: number
                              description: The price of the product. Maps to `products_info.product_name_price` in the Orders
                                table.
                              example: 20.0
                            quantity:
                              type: integer
                              description: The quantity of the product in the order. Maps to `products_info.product_name_quantity_sold`
                                in the Orders table.
                              example: 2
                            product_id:
                              type: string
                              description: The unique identifier for the product. Maps to `products_info.product_id` in the
                                Orders table. Required for [Product Analytics](https://app.triplewhale.com/dashboards/product-analytics);
                                must match a `product_id` sent via the `/products` endpoint.
                              example: product_123
                            product_name:
                              type: string
                              description: The name of the product associated with this line item. Maps to `products_info.product_name`
                                in the Orders table.
                              example: T-shirt
                            variant_id:
                              type: string
                              description: The unique identifier for the product variant. Maps to `products_info.variant_id`
                                in the Orders table.
                              example: variant_456
                            variant_name:
                              type: string
                              description: The name of the product variant. Maps to `products_info.variant_name` in the Orders
                                table.
                              example: Red T-shirt (Large)
                            sku:
                              type: string
                              description: The stock keeping unit of the product. Maps to `products_info.product_sku` in the
                                Orders table.
                              example: sku_123
                      name:
                        type: string
                        description: 'The name of the order, as assigned by the seller on the main sales platform. Maps to
                          `order_name` in the Orders table. Defaults to `order_id` if not provided.

                          '
                        example: 'Order #12345'
                      payment_gateway_names:
                        type: array
                        description: 'The payment gateway used for the transaction (e.g., `shopify_payments`, `paypal`, `gift_card`).
                          Required in order to update payment gateway settings, and to calculate `payment_gateway_costs` in
                          the Orders table. Edit Payment Gateway Costs in [Cost Settings](https://app.triplewhale.com/cost-settings)
                          > Gateway Costs.

                          '
                        items:
                          type: string
                        example:
                        - paypal
                      refunds:
                        type: array
                        description: Details of refunds applied to the order.
                        items:
                          type: object
                          required:
                          - refund_id
                          - refunded_at
                          - total_refund
                          properties:
                            refund_id:
                              type: string
                              description: The unique identifier for the refund.
                              example: refund_1
                            refunded_at:
                              type: string
                              format: date-time
                              description: 'The time at which the refund was processed. Must be provided in ISO 8601 format,
                                with explicit timezone information (`Z` or `+/-HH:mm` offset). Offsets are supported (e.g.,
                                `2024-11-29T12:00:00+02:00`).

                                '
                              example: '2024-11-29T11:00:00Z'
                            line_items:
                              type: array
                              description: Details of refunded line items.
                              items:
                                type: object
                                required:
                                - id
                                - quantity
                                - price
                                - variant_id
                                properties:
                                  id:
                                    type: string
                                    description: The unique identifier for the refunded line item.
                                    example: line_item_1
                                  line_item_id:
                                    type: string
                                    description: The unique identifier of the line item associated with this refund line item.
                                    example: line_item_1
                                  quantity:
                                    type: integer
                                    description: The quantity of the refunded line item.
                                    example: 1
                                  product_id:
                                    type: string
                                    description: The unique identifier for the refunded product.
                                    example: product_123
                                  variant_id:
                                    type: string
                                    description: The unique identifier for the refunded variant.
                                    example: variant_456
                                  price:
                                    type: number
                                    description: The price of the refunded line item.
                                    example: 20.0
                                  currency:
                                    type: string
                                    description: The currency of the refunded line item.
                                    example: USD
                                  total_discount:
                                    type: number
                                    description: The total discount applied to the refunded line item.
                                    example: 0.0
                            total_refund:
                              type: number
                              description: The total amount refunded.
                              example: 40.0
                            total_tax_refund:
                              type: number
                              description: The total tax refunded.
                              example: 3.0
                            total_shipping_refund:
                              type: number
                              description: The total shipping refunded.
                              example: 5.0
                            tags:
                              type: array
                              description: Tags associated with the refund.
                              items:
                                type: string
                                example: damaged_item
                            void:
                              type: boolean
                              description: 'Set to `true` to void (soft delete) this refund.  Voided refund records are excluded
                                from all queries.   To void a refund, resend the entire Order record with all fields identical
                                except for `"void": true` for this refund.   [Learn more](https://triplewhale.readme.io/reference/managing-data-in-connections#voiding-records-soft-delete)

                                '
                              default: false
                              example: false
                      shipping_address:
                        type: object
                        description: Shipping address details.
                        properties:
                          address_1:
                            type: string
                            description: The first line of the address.
                            example: 123 Main Street
                          address_2:
                            type: string
                            description: The second line of the address.
                            example: Apt 4B
                          zip:
                            type: string
                            description: The ZIP or postal code of the address.
                            example: '10001'
                          city:
                            type: string
                            description: The city of the address. Maps to `customer_from_city` in the Orders table.
                            example: New York
                          country:
                            type: string
                            description: The country of the address.
                            example: USA
                          country_code:
                            type: string
                            description: The country code of the address. Maps to `customer_from_country_code` in the Orders
                              table.
                            example: US
                          province_code:
                            type: string
                            description: The province or state code of the address. Maps to `customer_from_state_code` in
                              the Orders table.
                            example: NY
                      shipping_lines:
                        type: array
                        description: Details of the shipping lines for the order.
                        items:
                          type: object
                          properties:
                            shipping_discounted_price:
                              type: number
                              description: The discounted price for shipping.
                              example: 5.0
                            shipping_price:
                              type: number
                              description: The original price for shipping.
                              example: 10.0
                            source:
                              type: string
                              description: The source or method of shipping.
                              example: standard_shipping
                            title:
                              type: string
                              description: The title or description of the shipping method.
                              example: Standard Shipping
                      shipping_price:
                        type: number
                        description: The total shipping price of the order (paid by the buyer), including shipping taxes and
                          shipping discounts.
                        example: 15.0
                      shipping_costs:
                        type: number
                        description: 'Shipping costs paid by the seller. Must be non-negative. To apply this value to your
                          data, ensure **Default Shipping Costs** is selected in [Cost Settings](https://app.triplewhale.com/cost-settings)
                          > Shipping.

                          '
                        example: 15.0
                      source_name:
                        type: string
                        description: The origin of the order as designated by the seller on the main sales platform (e.g.
                          `web`, `pos`, `tiktok`).
                        example: web
                      subscription_id:
                        type: string
                        description: The unique identifier for the subscription associated with the order.
                        example: sub_12345
                      tags:
                        type: array
                        description: 'Tags associated with the order. Include a distinct tag to classify or identify specific
                          order types or processing rules. For example, use `holiday_sale` to mark seasonal campaign purchases,
                          or `staff_order` for internal orders.

                          '
                        items:
                          type: string
                        example:
                        - holiday_sale
                        - staff_order
                      taxes_included:
                        type: boolean
                        description: Indicates if taxes are included in the total price of the order.
                        default: false
                        example: false
                      order_revenue:
                        type: number
                        description: The total revenue after adjustments such as discounts, shipping, fees, and taxes. Must
                          be non-negative.
                        example: 150.75
                      total_discounts:
                        type: number
                        description: The total discount amount applied to the order, including shipping discounts. Must be
                          non-negative. Maps to `discount_amount` in the Orders table.
                        example: 15.5
                      taxes:
                        type: number
                        description: The total tax applied to the order. Must be non-negative.
                        example: 8.25
                      status:
                        type: string
                        description: The current status of the order (e.g., "completed", "pending"). Maps to `fulfillment_status`
                          in the Orders table.
                        example: completed
                      updated_at:
                        type: string
                        format: date-time
                        description: 'The time at which the order record was last updated. Must be provided in ISO 8601 format,
                          with explicit timezone information (`Z` or `+/-HH:mm` offset). Offsets are supported (e.g., `2024-11-29T12:00:00+02:00`).
                          Defaults to the current time.

                          '
                        example: '2024-11-29T10:00:00Z'
                      void:
                        type: boolean
                        description: 'Set to `true` to void (soft delete) this order record, as well as all associated refund
                          records  (even if the refunds are not individually voided).  Voided orders (and associated refunds)
                          are excluded from all queries.   To void an order record, resend it with all fields identical except
                          for `"void": true`.   [Learn more](https://triplewhale.readme.io/reference/managing-data-in-connections#voiding-records-soft-delete)

                          '
                        default: false
                        example: false
      responses:
        '200':
          description: Order records successfully received.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 1000 orders received
        '400':
          description: 'Bad Request. Returned if one or more orders fail validation. Valid orders in the same request are
            still processed even when this response is returned.

            '
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Validation errors
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        order_id:
                          type: string
                          example: '737052615'
                        error:
                          type: string
                          example: id is required
        '429':
          description: Too Many Requests
          headers:
            Retry-After:
              description: The number of seconds until the user can make another request.
              schema:
                type: string
              example: '60'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Rate limit exceeded. Try again later.
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Error processing order
  /data-in/subscriptions:
    post:
      summary: Create Subscription Record
      description: 'Ingest subscription data into Triple Whale. This endpoint allows users to upload detailed subscription
        information, including customer details, items, status, and metadata.

        '
      operationId: create-subscription-record
      tags:
      - Data In
      security:
      - apiKeyAuth: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - shop
              - subscription_id
              - created_at
              - currency
              - status
              - customer
              - subscription_items
              properties:
                shop:
                  type: string
                  description: 'The exact Shop URL (e.g., ''example.myshopify.com''). Must match the Shop URL value shown
                    in  [Settings → Store](https://app.triplewhale.com/store-settings/general). The API key owner must  also
                    have access to the shop, otherwise the request will return 403.

                    '
                  example: madisonbraids.myshopify.com
                subscription_id:
                  type: string
                  description: The unique identifier for the subscription.
                  example: sub-123
                platform:
                  type: string
                  description: 'The platform where the subscription was processed.

                    '
                  default: custom_subscription_platform
                  example: custom_subscription_platform
                platform_account_id:
                  type: string
                  description: 'The account ID associated with the platform. Can be used to segment parts of the data coming
                    from different platform accounts, e.g. `facebook_account_a` vs. `facebook_account_b`.

                    '
                  default: custom_platform_account
                  example: acct-456
                created_at:
                  type: string
                  format: date-time
                  description: 'The time at which the subscription record was created. Must be provided in ISO 8601 format,
                    with explicit timezone information (`Z` or `+/-HH:mm` offset). Offsets are supported (e.g., `2024-11-29T12:00:00+02:00`).

                    '
                  example: '2022-06-15T19:26:30.000Z'
                canceled_at:
                  type: string
                  format: date-time
                  description: 'The time the subscription was canceled, if applicable. Must be provided in ISO 8601 format,
                    with explicit timezone information (`Z` or `+/-HH:mm` offset). Offsets are supported (e.g., `2024-11-29T12:00:00+02:00`).

                    '
                  example: '2024-12-01T10:00:00Z'
                ended_at:
                  type: string
                  format: date-time
                  description: 'The time the subscription ended (canceled or expired), if applicable. Must be provided in
                    ISO 8601 format, with explicit timezone information (`Z` or `+/-HH:mm` offset). Offsets are supported
                    (e.g., `2024-11-29T12:00:00+02:00`).

                    '
                  example: '2024-12-15T12:00:00Z'
                cancellation_reason:
                  type: string
                  description: The reason for the subscription's cancellation.
                  example: Customer Request
                cancellation_comments:
                  type: string
                  description: Additional comments regarding the cancellation.
                  example: Dissatisfaction with service.
                currency:
                  type: string
                  description: The currency of the subscription (e.g., 'USD').
                  example: USD
                customer:
                  type: object
                  description: Details of the customer associated with the subscription.
                  required:
                  - id
                  properties:
                    id:
                      type: string
                      description: The unique identifier for the customer. Maps to `customer_id` in the Subscriptions table.
                      example: cust-789
                    email:
                      type: string
                      format: email
                      description: The customer's email address. At least one of email or phone is required.
                      example: customer@example.com
                    phone:
                      type: string
                      description: The customer's phone number. At least one of email or phone is required.
                      example: '+1234567890'
                    first_name:
                      type: string
                      description: The customer's first name.
                      example: John
                    last_name:
                      type: string
                      description: The customer's last name.
                      example: Doe
                subscription_items:
                  type: array
                  description: Details of the items included in the subscription. At least one is required.
                  minItems: 1
                  items:
                    type: object
                    required:
                    - subscription_item_id
                    - created_at
                    - status
                    - interval
                    - interval_count
                    - price
                    - quantity
                    properties:
                      subscription_item_id:
                        type: string
                        description: The unique identifier for the subscription item.
                        example: sub-item-001
                      created_at:
                        type: string
                        format: date-time
                        description: 'The date and time the subscription item was created. Must be provided in ISO 8601 format,
                          with explicit timezone information (`Z` or `+/-HH:mm` offset). Offsets are supported (e.g., `2024-11-29T12:00:00+02:00`).

                          '
                        example: '2022-06-15T19:26:30.000Z'
                      canceled_at:
                        type: string
                        format: date-time
                        description: 'The date and time the subscription item was canceled, if applicable. Must be provided
                          in ISO 8601 format, with explicit timezone information (`Z` or `+/-HH:mm` offset). Offsets are supported
                          (e.g., `2024-11-29T12:00:00+02:00`).

                          '
                        example: '2024-12-01T10:00:00Z'
                      ended_at:
                        type: string
                        format: date-time
                        description: 'The date and time the subscription item ended, if applicable. Must be provided in ISO
                          8601 format, with explicit timezone information (`Z` or `+/-HH:mm` offset). Offsets are supported
                          (e.g., `2024-11-29T12:00:00+02:00`).

                          '
                        example: '2024-12-15T12:00:00Z'
                      status:
                        type: string
                        enum:
                        - active
                        - canceled
                        - expired
                        - deleted
                        description: The current status of the subscription item.
                        example: active
                      interval:
                        type: string
                        enum:
                        - day
                        - week
                        - month
                        - year
                        description: The billing interval for the subscription item.
                        example: month
                      interval_count:
                        type: integer
                        description: The number of intervals for each billing cycle.
                        example: 1
                      product_id:
                        type: string
                        description: The unique identifier for the product associated with this item.
                        example: prod-123
                      price:
                        type: number
                        format: float
                        description: The price of the subscription item.
                        example: 19.99
                      quantity:
                        type: integer
                        description: The quantity of the subscription item.
                        example: 1
                      variant_id:
                        type: string
                        description: The unique identifier for the product variant, if applicable.
                        example: variant-123
                      discount:
                        type: object
                        description: Discounts applied to the subscription item.
                        default: {}
                        properties:
                          amount_off:
                            type: number
                            format: float
                            description: The amount of discount applied to the subscription item.
                            example: 5.0
                          percent_off:
                            type: number
                            format: float
                            description: The percentage of discount applied to the subscription item.
                            example: 10.0
                status:
                  type: string
                  description: The status of the subscription (e.g., active, canceled).
                  example: active
                metadata:
                  type: string
                  description: Additional metadata or notes related to the subscription.
                  example: Preferred customer
                updated_at:
                  type: string
                  format: date-time
                  description: 'The time at which the subscription record was last updated. Must be provided in ISO 8601 format,
                    with explicit timezone information (`Z` or `+/-HH:mm` offset). Offsets are supported (e.g., `2024-11-29T12:00:00+02:00`).
                    Defaults to the current time.

                    '
                  example: '2024-11-29T10:00:00Z'
      responses:
        '200':
          description: Subscription record successfully received.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Subscription received
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Invalid subscription data.
        '429':
          description: Too Many Requests
          headers:
            Retry-After:
              description: The number of seconds until the user can make another request.
              schema:
                type: string
              example: '60'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Rate limit exceeded. Try again later.
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Error processing subscription
  /data-in/products:
    post:
      summary: Create Product Record
      description: 'Ingest product data into Triple Whale. This endpoint allows users to upload detailed product information,
        including variants, tags, collections, and images.

        '
      operationId: create-product-record
      tags:
      - Data In
      security:
      - apiKeyAuth: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - shop
              - product_id
              - product_title
              - variants
              properties:
                shop:
                  type: string
                  description: 'The exact Shop URL (e.g., ''example.myshopify.com''). Must match the Shop URL value shown
                    in  [Settings → Store](https://app.triplewhale.com/store-settings/general). The API key owner must  also
                    have access to the shop, otherwise the request will return 403.

                    '
                  example: madisonbraids.myshopify.com
                platform:
                  type: string
                  description: 'The platform where the product originated.

                    '
                  default: custom-msp
                  example: magento
                platform_account_id:
                  type: string
                  description: 'The account ID associated with the platform.

                    '
                  default: custom-msp
                  example: shop_account_123
                product_id:
                  type: string
                  description: The unique identifier for the product. To use [Product Analytics](https://app.triplewhale.com/dashboards/product-analytics),
                    matching `line_items.product_id` values must also be sent via the `/orders` endpoint.
                  example: prod-123
                product_title:
                  type: string
                  description: The name or title of the product.
                  example: Triple Whale T-Shirt
                vendor:
                  type: string
                  description: The vendor of the product.
                  example: Triple Whale
                product_status:
                  type: string
                  description: 'The status of the product in the connected sales platform (e.g., `active`, `draft`, `archived`).

                    '
                  default: active
                  example: active
                product_tags:
                  type: array
                  description: Tags associated with the product, set in the main sales platform (e.g. `Upsell`, `Order Credits`,
                    `discount_eligible`).
                  items:
                    type: string
                  example:
                  - discount_eligible
                  - Upsell
                product_type:
                  type: string
                  description: The type or category of the product.
                  example: Clothing
                collections:
                  type: array
                  description: Collections the product belongs to.
                  items:
                    type: string
                  example:
                  - Summer Collection
                  - T-Shirts
                images:
                  type: array
                  description: Images associated with the product.
                  items:
                    type: object
                    required:
                    - image_id
                    - image_src
                    properties:
                      image_id:
                        type: string
                        description: The unique identifier for the image.
                        example: img-001
                      image_src:
                        type: string
                        description: The URL of the image.
                        example: https://example.com/image.jpg
                  default: []
                variants:
                  type: array
                  description: Variants of the product. If there are no variants, then use `product_id`.
                  items:
                    type: object
                    required:
                    - variant_id
                    - variant_title
                    properties:
                      variant_id:
                        type: string
                        description: The unique identifier for the variant.
                        example: variant-123
                      variant_title:
                        type: string
                        description: The name or title of the variant.
                        example: Blue / Medium
                      variant_price:
                        type: number
                        description: The price of the variant, to the buyer.
                        example: 19.99
                      sku:
                        type: string
                        description: The stock keeping unit (SKU) of the variant.
                        example: SKU12345
                      variant_cost:
                        type: number
                        description: The cost of the variant, to the seller.
                        example: 8.5
                      handling_fee:
                        type: number
                        description: The handling fee for the variant.
                        example: 5.5
                      inventory_quantity:
                        type: number
                        description: The number of items in stock for the variant.
                        example: 74
                      image_src:
                        type: string
                        description: The URL of the image associated with this variant.
                        example: https://example.com/variant-image.jpg
                      compare_at_price:
                        type: number
                        description: 'The original price of the variant before a discount is applied. Typically used to show
                          a strikethrough “compare at” price alongside the current selling price. Must be greater than or
                          equal to `variant_price`.

                          '
                        example: 29.99
                created_at:
                  type: string
                  format: date-time
                  description: 'The time at which the product record was created. Must be provided in ISO 8601 format, with
                    explicit timezone information (`Z` or `+/-HH:mm` offset). Offsets are supported (e.g., `2024-11-29T12:00:00+02:00`).
                    Defaults to the current time.

                    '
                  example: '2022-06-15T19:26:30.000Z'
                updated_at:
                  type: string
                  format: date-time
                  description: 'The time at which the product record was last updated. Must be provided in ISO 8601 format,
                    with explicit timezone information (`Z` or `+/-HH:mm` offset). Offsets are supported (e.g., `2024-11-29T12:00:00+02:00`).
                    Defaults to the current time.

                    '
                  example: '2024-11-29T10:00:00Z'
      responses:
        '200':
          description: Product record successfully received.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: product received
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Invalid product data.
        '429':
          description: Too Many Requests
          headers:
            Retry-After:
              description: The number of seconds until the user can make another request.
              schema:
                type: string
              example: '60'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Rate limit exceeded. Try again later.
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Error processing product
  /data-in/pps:
    post:
      summary: Create Post-Purchase Survey (PPS) Record
      description: 'Ingest PPS data into Triple Whale. This endpoint allows users to upload  detailed post-purchase survey
        information, including order-related data, questions, and responses.

        '
      operationId: create-pps-record
      tags:
      - Data In
      security:
      - apiKeyAuth: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - shop
              - order_id
              properties:
                shop:
                  type: string
                  description: 'The exact Shop URL (e.g., ''example.myshopify.com''). Must match the Shop URL value shown
                    in  [Settings → Store](https://app.triplewhale.com/store-settings/general). The API key owner must  also
                    have access to the shop, otherwise the request will return 403.

                    '
                  example: madisonbraids.myshopify.com
                platform:
                  type: string
                  description: 'The platform where the post-purchase survey originated.

                    '
                  default: custom_pps_platform
                  example: custom_pps_platform
                platform_account_id:
                  type: string
                  description: 'The account ID associated with the platform.

                    '
                  default: custom_platform_account
                  example: platform_account_123
                order_id:
                  type: string
                  description: The unique identifier for the order associated with the PPS.
                  example: order-123
                created_at:
                  type: string
                  format: date-time
                  description: 'The time at which the post-purchase survey record was created. Must be provided in ISO 8601
                    format, with explicit timezone information (`Z` or `+/-HH:mm` offset). Offsets are supported (e.g., `2024-11-29T12:00:00+02:00`).
                    Defaults to the current time.

                    '
                  example: '2022-06-15T19:26:30.000Z'
                total_price:
                  type: number
                  description: The total price of the order associated with the PPS. Must be non-negative.
                  example: 150.75
                question_id:
                  type: string
                  description: Unique ID for the survey question. If omitted, the data will still be used for attribution
                    (when `include_in_attribution = true`), but won’t appear in the PPS table, SQL, or Moby.
                  example: question-001
                question_text:
                  type: string
                  description: The text of the survey question. Maps to `question` in the Post-Purchase Survey table.
                  example: How did you hear about us?
                response_id:
                  type: string
                  description: Unique ID for the survey response.
                  example: response-001
                response:
                  type: string
                  description: The customer’s response to the survey question. Maps to `answer` in the Post-Purchase Survey
                    table.
                  example: Recommended by a friend
                include_in_attribution:
                  type: boolean
                  description: 'Set to `true` to include this survey response in the [Total Impact and Triple Attribution
                    models](https://kb.triplewhale.com/en/articles/5960333-understanding-and-utilizing-attribution-models#h_2edf480eb9).  If
                    omitted, Triple Whale will determine whether the question is attribution-related based on the `question_text`.

                    '
                  example: true
                source:
                  type: string
                  description: 'The marketing or referral channel that appears in [Attribution](https://app.triplewhale.com/dashboards/attribution/all/).
                    If omitted, Triple Whale infers the source from the `response` text. You may provide any string value,
                    but using a [Standardized PPS Source ID](https://triplewhale.readme.io/docs/post-purchase-survey-pps-standardized-source-ids#/)
                    (e.g. `facebook-ads`) ensures offline events are grouped with existing channels rather than appearing
                    as a separate custom source.

                    '
                  example: facebook-ads
      responses:
        '200':
          description: PPS record successfully received.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: pps received
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Invalid PPS data.
        '404':
          description: Order Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Order not found
        '429':
          description: Too Many Requests
          headers:
            Retry-After:
              description: The number of seconds until the user can make another request.
              schema:
                type: string
                example: '60'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Rate limit exceeded. Try again later.
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Error processing pps
  /data-in/customers:
    post:
      summary: Create Customer Record
      description: 'Ingest customer data into Triple Whale. This endpoint allows users to upload detailed customer information
        — including contact details, address, consent status, and purchase history metadata.

        '
      operationId: create-customer-record
      tags:
      - Data In
      security:
      - apiKeyAuth: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - shop
              - customer_id
              properties:
                shop:
                  type: string
                  description: 'The exact Shop URL (e.g., ''example.myshopify.com''). Must match the Shop URL value shown
                    in  [Settings → Store](https://app.triplewhale.com/store-settings/general). The API key owner must  also
                    have access to the shop, otherwise the request will return 403.

                    '
                  example: madisonbraids.myshopify.com
                customer_id:
                  type: string
                  description: The unique identifier for the customer.
                  example: '5209503793328'
                platform:
                  type: string
                  description: 'The platform associated with the customer record (e.g. `shopify`, `magento`, `woocommerce`,
                    `klaviyo`).

                    '
                  default: custom-msp
                  example: magento
                platform_account_id:
                  type: string
                  description: 'The account ID associated with the platform.

                    '
                  default: custom-msp
                  example: shop_account_123
                address1:
                  type: string
                  description: The first line of the customer's default address.
                  example: 764 Example Dr
                address2:
                  type: string
                  description: The second line of the customer's default address.
                  example: Apt 603
                amount_spent:
                  type: number
                  description: The total amount spent by the customer.
                  example: 1250.75
                city:
                  type: string
                  description: The city of the customer's default address.
                  example: San Francisco
                country:
                  type: string
                  description: The country of the customer's default address.
                  example: United States
                country_code:
                  type: string
                  description: The country code of the customer’s default address, according to ISO 3166-1 alpha-2.
                  example: US
                created_at:
                  type: string
                  format: date-time
                  description: 'The time at which the customer record was created. Must be provided in ISO 8601 format, with
                    explicit timezone information (`Z` or `+/-HH:mm` offset). Offsets are supported (e.g., `2024-11-29T12:00:00+02:00`).
                    Defaults to the current time.

                    '
                  example: '2022-06-15T19:26:30.000Z'
                customer_tags:
                  type: array
