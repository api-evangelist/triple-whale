                  - Active Subscriber
                  - PayPal_user
                  - Login with FB
                display_name:
                  type: string
                  description: The display name of the customer.
                  example: John Doe
                email_address:
                  type: string
                  description: The primary email address associated with the customer’s account.
                  example: customer@example.com
                email_marketing_consent_collected_from:
                  type: string
                  description: The source from which the customer's email marketing consent was collected.
                  example: website_signup
                email_marketing_consent_opt_in_level:
                  type: string
                  description: The level of consent provided by the customer for email marketing.
                  example: SINGLE_OPT_IN
                email_marketing_consent_status:
