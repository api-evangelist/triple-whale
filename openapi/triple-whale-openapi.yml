                  description: The level of consent provided by the customer for SMS marketing.
                  example: CONFIRMED_OPT_IN
                sms_marketing_consent_updated_at:
                  type: string
                  format: date-time
                  description: 'The time at which the sms marketing consent was updated. Must be provided in ISO 8601 format,
                    with explicit timezone information (`Z` or `+/-HH:mm` offset). Offsets are supported (e.g., `2024-11-29T12:00:00+02:00`).

                    '
                  example: '2019-05-22 21:01:29'
                state:
                  type: string
                  description: The state or province of the customer's default address.
                  example: Oregon
                state_code:
                  type: string
                  description: The state or province code of the customer's default address.
                  example: OR
                status:
                  type: string
                  description: The current status of the customer in the system.
                  example: ENABLED
                tax_exempt:
                  type: boolean
                  description: Indicates whether the customer is exempt from tax.
                  default: false
                  example: false
                zip:
                  type: string
                  description: The zip or postal code of the customer's defaults address.
                  example: '48104'
      responses:
        '200':
          description: Customer record successfully received.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: customer received
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Invalid customer data.
        '429':
          description: Too Many Requests
          headers:
            Retry-After:
              description: The number of seconds until the user can make another request.
              schema:
                type: string
              example: '60'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Rate limit exceeded. Try again later.
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Error processing customer
  /data-in/orders-enrichment:
    post:
      summary: Enrich Orders Data
      description: 'Use this endpoint to enrich existing orders—such as adding shipping costs or custom tags.  Note: Supported
        for data from platforms with a native Triple Whale integration  (e.g., Shopify, BigCommerce, WooCommerce).  Not supported
        for Custom Sales Platforms—to update these, resend the full order via the [Orders](https://triplewhale.readme.io/reference/create-order-record)
        endpoint.

        '
      operationId: enrich-orders-data
      tags:
      - Data In
      security:
      - apiKeyAuth: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - shop
              - order_id
              properties:
                custom_expenses:
                  type: number
                  description: 'Additional custom expenses associated with the order, in the currency of the order enriched.
                    Must be non-negative.

                    '
                  example: 25.0
                custom_gross_profit:
                  type: number
                  description: 'Custom Gross Profit for the order, in the currency of the order being enriched. Must be non-negative.

                    '
                  example: 400
                custom_gross_sales:
                  type: number
                  description: 'Custom Gross Sales for the order, in the currency of the order being enriched. Must be non-negative.

                    '
                  example: 2000
                custom_net_revenue:
                  type: number
                  description: 'Custom Net Revenue for the order, in the currency of the order being enriched. Must be non-negative.

                    '
                  example: 1200
                custom_number:
                  type: number
                  description: 'A custom numeric value for the order, can be used for specialized calculations, references,
                    or reporting.

                    '
                  example: 3.14
                custom_status:
                  type: string
                  description: 'A custom status label for the order, useful for filtering on statuses not  captured by the
                    built-in `status` field.

                    '
                  example: unfulfilled
                custom_string:
                  type: string
                  description: 'A free-form text field for storing additional metadata, internal notes, or other custom data
                    relevant to this order.

                    '
                  example: AlphaBetaTest
                ignore_order:
                  type: boolean
                  description: 'If true, the order is flagged to be ignored in standard reporting  (e.g., to exclude test
                    data or partial orders).

                    '
                  default: false
                  example: false
                order_id:
                  type: string
                  description: 'The unique identifier for the order being enriched.

                    '
                  example: order_12345
                orders_quantity:
                  type: number
                  description: 'The quantity of orders to count for this single order_id. Must be 0 or 1.

                    '
                  example: 1
                platform:
                  type: string
                  description: 'The sales platform where the order being enriched was processed. Required for secondary sales
                    platforms (e.g. Amazon), optional for main sales platform (e.g. Shopify).

                    '
                  example: amazon
                shipping_costs:
                  type: number
                  description: 'Shipping costs paid by the seller for the order, in the currency of the order being enriched.
                    Must be non-negative. To apply this value to your data, ensure **Default Shipping Costs** is selected
                    in [Cost Settings](https://app.triplewhale.com/cost-settings) > Shipping.

                    '
                  example: 15.0
                shop:
                  type: string
                  description: 'The exact Shop URL (e.g., ''example.myshopify.com''). Must match the Shop URL value shown
                    in  [Settings → Store](https://app.triplewhale.com/store-settings/general). The API key owner must  also
                    have access to the shop, otherwise the request will return 403.

                    '
                  example: madisonbraids.myshopify.com
                total_items_quantity:
                  type: number
                  description: 'The total number of items in the order. Must be non-negative.

                    '
                  example: 10
      responses:
        '200':
          description: Order enrichment successfully received.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Order enrichment received
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Invalid order enrichment data.
        '429':
          description: Too Many Requests
          headers:
            Retry-After:
              description: The number of seconds until the user can make another request.
              schema:
                type: string
              example: '60'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Rate limit exceeded. Try again later.
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Error processing order enrichment
