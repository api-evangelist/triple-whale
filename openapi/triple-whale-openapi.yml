      - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - shop
              - type
              - profileIdentifiers
              properties:
                shop:
                  type: string
                  description: 'The exact Shop URL (e.g., ''example.myshopify.com''). Must match the Shop URL value shown
                    in  [Settings → Store](https://app.triplewhale.com/store-settings/general). The API key owner must  also
                    have access to the shop, otherwise the request will return 403.

                    '
                  example: madisonbraids.myshopify.com
                type:
                  type: string
                  description: 'The event category. Can be a standard lifecycle event (`lead`, `mql`, `sql`, `opportunity`,
                    `book_demo`) or a Custom event (`custom`).

                    '
                  enum:
                  - lead
                  - mql
                  - sql
                  - opportunity
                  - book_demo
                  - custom
                  example: custom
                profileIdentifiers:
                  type: object
                  description: 'At least one identifier is required.   Use these to match the event to an existing or future
                    profile.

                    '
                  properties:
                    email:
                      type: string
                      format: email
                      example: john.smith@gmail.com
                    phone:
                      type: string
                      example: +1-555-123-4567
                    externalId:
                      type: string
                      example: user_123
                eventId:
                  type: string
                  description: 'Optional unique identifier for the event to prevent duplicates.

                    '
                  example: event_456
                timestamp:
                  type: number
                  format: int64
                  description: 'Optional UNIX timestamp in **seconds** for when the event occurred.   Defaults to the current
                    server time if omitted.

                    '
                  example: 1732579200
                event_name:
                  type: string
                  description: 'Required only when **type** = `custom`.   A descriptive name for the custom event.

                    '
                  example: productCustomizationInteraction
                source:
                  type: string
                  description: 'Optional attribution source for custom events. To have events grouped into existing paid channels
                    in [Attribution](https://app.triplewhale.com/dashboards/attribution/all/), use a [standardized source
                    ID](https://triplewhale.readme.io/docs/post-purchase-survey-pps-standardized-source-ids) (e.g. `facebook-ads`).
                    Custom values will appear as separate custom sources.

                    '
