                  example: en-US
                longitude:
                  type: number
                  description: The longitude associated with the customer's location.
                  example: -118.8639169
                note:
                  type: string
                  description: Any note attached to the customer profile.
                  example: VIP customer
                number_of_orders:
                  type: integer
                  description: The total number of orders placed by the customer.
                  example: 15
                phone:
                  type: string
                  description: The customer's phone number.
                  example: '18005550199'
                product_subscriber_status:
                  type: string
                  description: The customer's subscription status for products.
                  example: ACTIVE
                sms_marketing_consent_collected_from:
